name: Axosyslog Version Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-bump:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup environment
        run: python3 -m pip install poetry

      - name: Run version update
        id: update
        run: |
          ./update_axosyslog_version.sh
          echo "branch=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Push branch and open PR
        if: steps.update.outputs.branch != 'main'
        run: |
          BRANCH="${{ steps.update.outputs.branch }}"
          VERSION="${BRANCH#axosyslog-upgrade-}"

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json number --jq 'length')
          if [ "${EXISTING_PR}" -gt 0 ]; then
            echo "PR already exists for ${BRANCH}, skipping."
            exit 0
          fi

          git push origin "${BRANCH}"

          gh pr create \
            --title "axosyslog: upgrade to ${VERSION}" \
            --body "Automated upgrade to AxoSyslog ${VERSION}." \
            --head "${BRANCH}" \
            --base main
